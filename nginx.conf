server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Vue Router history mode
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    location /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # Proxy to product-service (Java/Spring Boot on port 8080)
    location /products {
        proxy_pass http://product-service:8080/products;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy to order-service (Node.js on port 3000)
    location /orders {
        proxy_pass http://order-service:3000/orders;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy to ai-service (Python/FastAPI on port 5000)
    # /ai/generate/description -> ai-service:5000/generate/description
    # /ai/health              -> ai-service:5000/health
    location /ai/ {
        proxy_pass http://ai-service:5000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
